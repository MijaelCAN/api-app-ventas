info:
  name: VERSION
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}api/Version?imei={{imei}}&token={{token}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: token
      value: "{{token}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
