info:
  name: Estado de Depositos
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}api/Collections/Deposit_Status?imei={{imei}}&Status={{status}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: Status
      value: "{{status}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
