info:
  name: Precio - Cliente
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}api/PriceList/PriceWarehouseClient?imei={{imei}}&Almacen={{almacen}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: Almacen
      value: "{{almacen}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
