info:
  name: Historico de Venta
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}api/HistoricalSales/Type?imei={{imei}}&type=SKU&cardCode={{rucCliente}}&fecini={{fecha}}&fecfin={{fecha}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: type
      value: SKU
      type: query
    - name: cardCode
      value: "{{rucCliente}}"
      type: query
    - name: fecini
      value: "{{fecha}}"
      type: query
    - name: fecfin
      value: "{{fecha}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
