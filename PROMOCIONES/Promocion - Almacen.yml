info:
  name: Promocion - Almacen
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}api/PromotionHeader/PromWareHouse?imei={{imei}}&WhsCode={{almacen}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: WhsCode
      value: "{{almacen}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
