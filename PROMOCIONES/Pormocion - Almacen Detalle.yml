info:
  name: Pormocion - Almacen Detalle
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}api/PromotionDetail/PromDetailWareHouse?imei={{imei}}&WhsCode={{almacen}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: WhsCode
      value: "{{almacen}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
