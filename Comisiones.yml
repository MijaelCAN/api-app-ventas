info:
  name: Comisiones
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}api/Commissions?imei={{imei}}&Year={{anioComision}}&Month={{mesComision}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: Year
      value: "{{anioComision}}"
      type: query
    - name: Month
      value: "{{mesComision}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
