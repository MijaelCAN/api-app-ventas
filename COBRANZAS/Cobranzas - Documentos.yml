info:
  name: Cobranzas - Documentos
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}api/Collections/Document?imei={{imei}}&docentry={{docEntry}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: docentry
      value: "{{docEntry}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
