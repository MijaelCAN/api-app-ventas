info:
  name: Estado de Cobranza
  type: http
  seq: 16

http:
  method: GET
  url: "{{baseUrl}}api/Collections/Status?imei={{imei}}&status=A"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: status
      value: A
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
