info:
  name: TradeMarketing por Fecha
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}api/survey/RangoEncuestas?CodVendedor={{codVendedor}}&FechaInicio={{fecha}}&FechaFin={{fecha}}"
  params:
    - name: CodVendedor
      value: "{{codVendedor}}"
      type: query
    - name: FechaInicio
      value: "{{fecha}}"
      type: query
    - name: FechaFin
      value: "{{fecha}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
