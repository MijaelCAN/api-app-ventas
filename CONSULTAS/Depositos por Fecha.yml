info:
  name: Depositos por Fecha
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}api/Deposits?imei={{imei}}&fecIni={{fecha}}&fecFin={{fecha}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: fecIni
      value: "{{fecha}}"
      type: query
    - name: fecFin
      value: "{{fecha}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
