info:
  name: Despachos por Fecha
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}api/Dispatch/List?imei={{imei}}&fecha={{fecha}}&flag=Seller"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: fecha
      value: "{{fecha}}"
      type: query
    - name: flag
      value: Seller
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
