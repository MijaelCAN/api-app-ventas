opencollection: 1.0.0

info:
  name: APP-VENTAS
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: before-request
      code: |-
        const fecha = new Date();

        const hoy = [
          fecha.getFullYear(),
          String(fecha.getMonth() + 1).padStart(2, '0'),
          String(fecha.getDate()).padStart(2, '0')
        ].join('-');

        bru.setVar('fecha', hoy);
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
