info:
  name: Efectividad
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}api/Effectiveness?imei={{imei}}&startDate={{fecha}}&endDate={{fecha}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: startDate
      value: "{{fecha}}"
      type: query
    - name: endDate
      value: "{{fecha}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
