info:
  name: Variables - Ventas Historicas
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}api/HistoricalSales/Variable?imei={{imei}}&fecini={{fecha}}&fecfin={{fecha}}"
  params:
    - name: imei
      value: "{{imei}}"
      type: query
    - name: fecini
      value: "{{fecha}}"
      type: query
    - name: fecfin
      value: "{{fecha}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
